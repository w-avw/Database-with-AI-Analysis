
# Docker Compose file for Universal DB - Fast TXT File Processing
# PostgreSQL database with Grafana analytics and visualization
version: '3.8'

services:
  # 1. PostgreSQL database service
  postgres:
    image: postgres:13
    container_name: universal-db-postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"                          # Expose DB port
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist DB data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql # Initialize schema
    command: postgres -c listen_addresses='*'
    networks:
      universal-db-network:
        aliases:
          - postgres

  # 2. Grafana analytics and visualization
  grafana:
    image: grafana/grafana:latest
    container_name: universal-db-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_COOKIE_SECURE=false
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_SERVER_DOMAIN=localhost
      - GF_SERVER_ROOT_URL=http://localhost:3000
    ports:
      - "3000:3000"                     # Grafana web interface
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - postgres
    networks:
      - universal-db-network

# Docker volumes for persistent data
volumes:
  postgres_data:
  grafana_data:

# Network for service communication
networks:
  universal-db-network:
    driver: bridge