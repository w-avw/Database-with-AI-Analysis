<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Integration Plugin Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        textarea { width: 100%; height: 100px; padding: 10px; }
        button { padding: 10px 20px; margin: 10px 5px 0 0; background: #0073aa; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #005a87; }
        .secondary { background: #666; }
        .secondary:hover { background: #444; }
        .success { background: #46b450; }
        .success:hover { background: #399945; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Word Integration Plugin Test</h1>
        
        <div class="section">
            <h3>Add Content</h3>
            <p>Enter text to add at the beginning of the document:</p>
            <textarea id="addText" placeholder="Enter text to add at the beginning of the document"></textarea>
            <br>
            <button id="addBtn">Add Content & Export</button>
        </div>
        
        <div class="section">
            <h3>Remove Short Paragraphs</h3>
            <p>This will remove paragraphs with 2 lines or less, or 100 characters or less.</p>
            <button id="removeBtn" class="secondary">Remove Short Paragraphs & Export</button>
        </div>
        
        <div class="section">
            <h3>Download Original</h3>
            <p>Download the original document without modifications.</p>
            <button id="originalBtn" class="success">Download Original Document</button>
        </div>
        
        <div class="section">
            <h3>Status</h3>
            <div id="status">Ready to use</div>
        </div>
    </div>

    <script>
        function setStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.style.color = isError ? 'red' : 'green';
        }

        document.getElementById('addBtn').onclick = async () => {
            const text = document.getElementById('addText').value;
            if (!text.trim()) {
                alert('Please enter some text to add.');
                return;
            }
            
            setStatus('Adding content...');
            
            try {
                const res = await fetch('http://localhost:3001/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'add', text: text })
                });
                
                if (res.ok) {
                    const blob = await res.blob();
                    downloadFile(blob, 'document_with_added_content.docm');
                    document.getElementById('addText').value = '';
                    setStatus('Content added successfully!');
                } else {
                    setStatus('Error adding content to document', true);
                }
            } catch (error) {
                setStatus('Error connecting to server: ' + error.message, true);
            }
        };

        document.getElementById('removeBtn').onclick = async () => {
            if (!confirm('This will remove paragraphs with 2 lines or less, or 100 characters or less. Continue?')) {
                return;
            }
            
            setStatus('Removing paragraphs...');
            
            try {
                const res = await fetch('http://localhost:3001/remove-paragraphs', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ maxLines: 2, maxCharacters: 100 })
                });
                
                if (res.ok) {
                    const blob = await res.blob();
                    downloadFile(blob, 'document_paragraphs_removed.docm');
                    setStatus('Paragraphs removed successfully!');
                } else {
                    setStatus('Error removing paragraphs from document', true);
                }
            } catch (error) {
                setStatus('Error connecting to server: ' + error.message, true);
            }
        };

        document.getElementById('originalBtn').onclick = async () => {
            setStatus('Downloading original...');
            
            try {
                const res = await fetch('http://localhost:3001/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ action: 'original' })
                });
                
                if (res.ok) {
                    const blob = await res.blob();
                    downloadFile(blob, 'original_document.docm');
                    setStatus('Original document downloaded!');
                } else {
                    setStatus('Error downloading original document', true);
                }
            } catch (error) {
                setStatus('Error connecting to server: ' + error.message, true);
            }
        };

        function downloadFile(blob, filename) {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(url);
        }

        // Test connection on load
        fetch('http://localhost:3001/generate', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ action: 'test' })
        }).then(() => {
            setStatus('Backend connected and ready!');
        }).catch(() => {
            setStatus('Backend connection failed - make sure Layer 9 is running', true);
        });
    </script>
</body>
</html>
