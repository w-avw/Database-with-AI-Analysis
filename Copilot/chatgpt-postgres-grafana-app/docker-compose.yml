
# Docker Compose file for Universal DB - Fast TXT File Processing
# PostgreSQL database with automatic .txt file import capability
version: '3.8'

services:
  # 1. PostgreSQL database service
  mypg:
    build:
      context: ./docker/postgres
    container_name: mypg
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5433:5432"                          # Expose DB port
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist DB data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql # Init schema

  # 2. Node.js application service (optional - for API access)
  app:
    build:
      context: .
    depends_on:
      - mypg
    environment:
      DATABASE_URL: postgres://myuser:mypass@mypg:5432/mydb
      CHATGPT_API_KEY: ${CHATGPT_API_KEY:-dummy_key}
    ports:
      - "3000:3000"                     # Expose app port

# 3. Docker volume for persistent Postgres data
volumes:
  postgres_data: